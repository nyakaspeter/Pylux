# Pylux Flatpak manifest — keep in sync with Flathub (update commit hash on each release):
#   https://github.com/flathub/io.github.ForWard_Technologies_LLC.Pylux
# deploy-flatpak.yml builds from local checkout (dir source) for CI; Flathub repo pins git commit.

app-id: io.github.ForWard_Technologies_LLC.Pylux
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
command: chiaki
rename-icon: chiaking
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --allow=bluetooth
  - --socket=pulseaudio
  - --env=QTWEBENGINEPROCESS_PATH=/app/bin/QtWebEngineProcess
  - --env=DBUS_FATAL_WARNINGS=0
  - --env=QML_DISABLE_DISK_CACHE=1
  - --env=SDL_AUDIODRIVER=pipewire
  - --system-talk-name=org.freedesktop.login1
  - --filesystem=xdg-run/pipewire-0
  - --filesystem=xdg-run/gamescope-0
  - --filesystem=xdg-download
  - --filesystem=~/.steam/steam
  - --filesystem=~/.var/app/com.valvesoftware.Steam/data/Steam

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /lib/*.la

cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - name: protobuf-compilers
    buildsystem: cmake-ninja
    config-opts:
      - -Dprotobuf_BUILD_TESTS=OFF
      - -Dprotobuf_BUILD_SHARED_LIBS=ON
      - -Dprotobuf_BUILD_EXAMPLES=OFF
    sources:
      - type: archive
        url: https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protobuf-cpp-3.21.12.tar.gz
        sha256: 4eab9b524aa5913c6fffb20b2a8abf5ef7f95a80bc0701f3a6dbb4c607f73460

  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dvulkan=enabled
      - -Dshaderc=enabled
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4

  - name: python3-google
    buildsystem: simple
    build-commands:
      - "pip3 install --no-index --find-links=\"file://${PWD}\" --prefix=${FLATPAK_DEST} --no-build-isolation google"
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/3e/db/5ba900920642414333bdc3cb397075381d63eafc7e75c2373bbc560a9fa1/soupsieve-2.0.1.tar.gz
        sha256: a59dc181727e95d25f781f0eb4fd1825ff45590ec8ff49eadfd7f1a537cc0232
      - type: file
        url: https://files.pythonhosted.org/packages/e8/b0/cd2b968000577ec5ce6c741a54d846dfa402372369b8b6861720aa9ecea7/beautifulsoup4-4.11.1.tar.gz
        sha256: ad9aa55b65ef2808eb405f46cf74df7fcb7044d5cbc26487f96eb2ef2e436693
      - type: file
        url: https://files.pythonhosted.org/packages/89/97/b49c69893cddea912c7a660a4b6102c6b02cd268f8c7162dd70b7c16f753/google-3.0.0.tar.gz
        sha256: 143530122ee5130509ad5e989f0512f7cb218b2d4eddbafbad40fd10e8d8ccbe

  - name: python3-protobuf
    buildsystem: simple
    build-commands:
      - "pip3 install --no-index --find-links=\"file://${PWD}\" --prefix=${FLATPAK_DEST} --no-build-isolation protobuf"
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/ba/dd/f8a01b146bf45ac12a829bbc599e6590aa6a6849ace7d28c42d77041d6ab/protobuf-4.21.12.tar.gz
        sha256: 7cd532c4566d0e6feafecc1059d04c7915aec8e182d1cf7adee8b24ef1e2e6ab

  - name: hidapi
    buildsystem: cmake-ninja
    config-opts:
      - -DHIDAPI_WITH_LIBUSB=FALSE
    sources:
      - type: git
        url: https://github.com/libusb/hidapi.git
        tag: hidapi-0.15.0
        commit: d6b2a974608dec3b76fb1e36c189f22b9cf3650c

  - name: speexDSP
    buildsystem: autotools
    sources:
      - type: git
        url: https://gitlab.xiph.org/xiph/speexdsp.git
        tag: SpeexDSP-1.2.1
        commit: 1b28a0f61bc31162979e1f26f3981fc3637095c8

  - name: json-c
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_APPS=OFF
    sources:
      - type: git
        url: https://github.com/json-c/json-c.git
        tag: json-c-0.18-20240915
        commit: 41a55cfcedb54d9c1874f2f0eb07b504091d7e37

  - name: miniupnpc
    buildsystem: cmake-ninja
    subdir: miniupnpc
    sources:
      - type: git
        url: https://github.com/miniupnp/miniupnp
        tag: miniupnpc_2_3_0
        commit: f39e4997591a98e7ee6711eabc8b50feeef1bd67

  - name: pylux
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCHIAKI_ENABLE_TESTS=OFF
    sources:
      - type: git
        url: https://github.com/ForWard-Technologies-LLC/Pylux.git
        commit: 49800dd726c179847534c25dfa7889a54920df78
